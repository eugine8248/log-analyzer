name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create releases + upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore + Publish (Release)
        run: |
          dotnet restore src/LogAnzlyzer/LogAnzlyzer.csproj
          dotnet publish src/LogAnzlyzer/LogAnzlyzer.csproj -c Release -o dist

      - name: Optional code-sign (skipped if SIGN_CERT_PFX_BASE64 secret not set)
        if: env.SIGN_CERT_PFX_BASE64 != ''
        env:
          SIGN_CERT_PFX_BASE64: ${{ secrets.SIGN_CERT_PFX_BASE64 }}
          SIGN_CERT_PASSWORD:   ${{ secrets.SIGN_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String($env:SIGN_CERT_PFX_BASE64)
          [System.IO.File]::WriteAllBytes("$env:TEMP\sign.pfx", $bytes)
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
            /f "$env:TEMP\sign.pfx" /p "$env:SIGN_CERT_PASSWORD" `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            "dist/LogAnzlyzer.exe"
          Remove-Item "$env:TEMP\sign.pfx" -Force

      - name: Zip release artifacts
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "dist/LogAnzlyzer-$tag-win-x64.zip"
          Compress-Archive -Path 'dist/LogAnzlyzer.exe','dist/LogAnzlyzer.exe.config','dist/ScottPlot.dll','dist/ScottPlot.WinForms.dll','dist/System.Data.SQLite.dll','dist/System.Drawing.Common.dll','dist/System.Numerics.Vectors.dll' -DestinationPath $zip -Force
          Write-Host "Built $zip"

      - name: Create GitHub Release with asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/LogAnzlyzer-${{ github.ref_name }}-win-x64.zip
